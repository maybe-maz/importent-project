<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Log</title>
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe2ec;
      --blue: #1d9cd8;
      --dark: #1b2a4d;
      --green: #16a34a;
      --orange: #f97316;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      background: #f1f4f9;
      border: 1px solid #d4dbe5;
      border-radius: 16px;
      overflow: hidden;
    }

    .top {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      background: #f1f4f9;
    }

    .left-block {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }

    .btn.qr {
      background: var(--blue);
    }

    .btn.back {
      background: var(--dark);
    }

    .session-card {
      background: #e9edf3;
      border: 1px solid #ccd5e2;
      border-radius: 16px;
      padding: 10px 14px;
      min-width: 230px;
    }

    .session-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .session-value {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8fafc;
      border: 1px solid #d8e0eb;
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 22px;
      font-weight: bold;
      color: #0b2446;
    }

    .right-info {
      text-align: left;
    }

    .crumbs {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .room-chip {
      border: 1px solid #cdd6e3;
      background: #f8fafc;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
      color: #334155;
    }

    .title {
      font-size: 28px;
      margin: 0;
      color: #0f294d;
    }

    .time {
      color: #5b6473;
      font-size: 15px;
      font-weight: 600;
    }

    .timer {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
      margin-top: 4px;
    }

    .stats {
      padding: 16px 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat .name {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .count {
      font-size: 24px;
      font-weight: 800;
    }

    .stat .icon {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }

    .c-total { color: #0f294d; }
    .c-present { color: var(--green); }
    .c-late { color: var(--orange); }
    .c-absent { color: var(--red); }
    .c-excused { color: #2563eb; }

    .i-total { background: #eef2f7; color: #475569; }
    .i-present { background: #e7f8ec; color: var(--green); }
    .i-late { background: #fff3e8; color: var(--orange); }
    .i-absent { background: #ffe8e8; color: var(--red); }
    .i-excused { background: #e7f0ff; color: #2563eb; }

    .table-wrap {
      margin: 6px 18px 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-head {
      padding: 14px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      font-weight: bold;
      color: #0f294d;
      font-size: 18px;
    }

    .export-btn {
      border: 1px solid #ccd5e2;
      background: #f8fafc;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #334155;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #e8edf5;
    }

    th {
      color: #64748b;
      background: #fbfcfe;
      font-weight: 700;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .b-present { background: #e8f8ee; color: var(--green); }
    .b-late { background: #fff2e8; color: var(--orange); }
    .b-absent { background: #ffe8e8; color: var(--red); }

    .presence-btn {
      border: 1px solid #86efac;
      color: #16a34a;
      background: #ecfdf3;
      border-radius: 10px;
      padding: 4px 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .title {
        font-size: 24px;
      }
      .time {
        font-size: 14px;
      }
    }

    @media (max-width: 680px) {
      .stats {
        grid-template-columns: 1fr;
      }
      .top {
        flex-direction: column-reverse;
      }
      table {
        font-size: 14px;
      }
      th {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="left-block">
        <button class="btn qr" onclick="goToQr()">Show Student QR</button>
        <button class="btn back" onclick="goBackToSubject()">Back</button>
        <div class="session-card">
          <div class="session-label">Session Number</div>
          <div class="session-value">
            <span>📶</span>
            <span id="sessionNumber">1</span>
          </div>
        </div>
      </div>

      <div class="right-info">
        <div class="crumbs">Home &lt; Doctor Dashboard &lt; <span id="subjectCrumb">Subject</span> &lt; Session Details</div>
        <div class="title-row">
          <span class="room-chip" id="roomChip">Room 0 📍</span>
          <h1 class="title" id="subjectTitle">Subject</h1>
        </div>
        <div class="time" id="lectureTime">--:-- - --:-- 🕒</div>
        <div class="timer" id="lectureTimer">Timer: --</div>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-wrap">
      <div class="table-head">
        <div>Attendance Log</div>
        <button class="export-btn" onclick="exportTable()">Export ⭳</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Student Name</th>
            <th>Check-in Time</th>
            <th>Status</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="attendanceRows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject');
    const doctor = params.get('doctor');
    const API_BASE_STORAGE_KEY = 'attendanceApiBaseUrl';
    const SUPABASE_ANON_KEY_STORAGE_KEY = 'attendanceSupabaseAnonKey';
    const lecture = JSON.parse(sessionStorage.getItem('selectedLecture') || 'null');
    const subjectName = subject || 'Subject';
    const doctorName = doctor || 'No doctor';
    let lectureTimerIntervalId = null;

    let students = [];

    function normalizeApiBase(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function getApiBase() {
      return normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY) || '');
    }

    function getSupabaseRestBase() {
      const base = getApiBase();
      if (!base) return '';
      if (base.includes('/rest/v1')) return base;
      if (base.includes('.supabase.co')) return `${base}/rest/v1`;
      return '';
    }

    function getSupabaseAnonKey() {
      return (localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
    }

    function isSupabaseMode() {
      return !!(getSupabaseRestBase() && getSupabaseAnonKey());
    }

    function isUuid(value) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test((value || '').trim());
    }

    function getSupabaseHeaders() {
      const key = getSupabaseAnonKey();
      return {
        'Content-Type': 'application/json',
        apikey: key,
        Authorization: `Bearer ${key}`
      };
    }

    function formatDbTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toTimeString().slice(0, 8);
    }

    function parseHhmmToday(value) {
      if (!value || typeof value !== 'string' || !/^\d{2}:\d{2}$/.test(value)) return null;
      const [hours, minutes] = value.split(':').map(Number);
      if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;

      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0, 0);
    }

    function parseCheckinDate(value) {
      if (!value || typeof value !== 'string') return null;

      const direct = new Date(value);
      if (!Number.isNaN(direct.getTime())) return direct;

      const match = value.match(/^(\d{2}):(\d{2})(?::(\d{2}))?$/);
      if (!match) return null;

      const hours = Number(match[1]);
      const minutes = Number(match[2]);
      const seconds = Number(match[3] || '0');
      if (Number.isNaN(hours) || Number.isNaN(minutes) || Number.isNaN(seconds)) return null;

      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, seconds, 0);
    }

    function classifyStatusByTimes(checkinValue, fallbackStatus = 'absent') {
      if (!lecture || !lecture.startTime) return fallbackStatus;

      const startAt = parseHhmmToday(lecture.startTime);
      const checkinAt = parseCheckinDate(checkinValue);
      if (!startAt || !checkinAt) return fallbackStatus;

      const diffMinutes = (checkinAt.getTime() - startAt.getTime()) / 60000;
      if (diffMinutes <= 5) return 'present';
      if (diffMinutes <= 15) return 'late';
      return 'absent';
    }

    function getLectureId() {
      if (lecture && lecture.id) return lecture.id;
      if (!lecture) return 'default-lecture';
      return [
        lecture.roomNumber || '-',
        lecture.startTime || '-',
        lecture.endTime || '-',
        lecture.password || '-'
      ].join('::');
    }

    async function loadAttendance() {
      const lectureId = getLectureId();
      if (lectureId && lectureId !== 'default-lecture') {
        try {
          if (isSupabaseMode() && isUuid(lectureId)) {
            const response = await fetch(`${getSupabaseRestBase()}/attendance?lecture_id=eq.${encodeURIComponent(lectureId)}&select=*`, {
              headers: getSupabaseHeaders()
            });
            if (response.ok) {
              const rows = await response.json();
              students = rows.map((row) => ({
                id: row.student_id,
                name: row.student_name,
                time: formatDbTime(row.checkin_time),
                status: classifyStatusByTimes(row.checkin_time, row.status || 'absent'),
                note: row.note || '-'
              }));
              renderStats();
              renderTable();
              return;
            }
          }

          const response = await fetch(`${getApiBase()}/api/attendance?lectureId=${encodeURIComponent(lectureId)}`);
          if (response.ok) {
            const rows = await response.json();
            students = rows.map((row) => ({
              ...row,
              status: classifyStatusByTimes(row.time, row.status || 'absent')
            }));
            renderStats();
            renderTable();
            return;
          }
        } catch {
        }
      }

      students = [];
      renderStats();
      renderTable();
    }

    function goBackToSubject() {
      if (subject && doctor) {
        window.location.href = `subject-details.html?subject=${encodeURIComponent(subject)}&doctor=${encodeURIComponent(doctor)}`;
        return;
      }
      window.location.href = 'subject-details.html';
    }

    function goToQr() {
      if (subject && doctor) {
        window.location.href = `lecture-details.html?subject=${encodeURIComponent(subject)}&doctor=${encodeURIComponent(doctor)}`;
        return;
      }
      window.location.href = 'lecture-details.html';
    }

    function getStatusLabel(status) {
      if (status === 'present') return 'Present';
      if (status === 'late') return 'Late';
      return 'Absent';
    }

    function getStatusClass(status) {
      if (status === 'present') return 'b-present';
      if (status === 'late') return 'b-late';
      return 'b-absent';
    }

    function renderStats() {
      const total = students.length;
      const present = students.filter(s => s.status === 'present').length;
      const late = students.filter(s => s.status === 'late').length;
      const absent = students.filter(s => s.status === 'absent').length;
      const excused = students.filter(s => s.note && s.note !== '-').length;

      const cards = [
        { name: 'Total', count: total, icon: '👥', countClass: 'c-total', iconClass: 'i-total' },
        { name: 'Present', count: present, icon: '✓', countClass: 'c-present', iconClass: 'i-present' },
        { name: 'Late', count: late, icon: '🕒', countClass: 'c-late', iconClass: 'i-late' },
        { name: 'Absent', count: absent, icon: '✕', countClass: 'c-absent', iconClass: 'i-absent' },
        { name: 'Excused', count: excused, icon: '!', countClass: 'c-excused', iconClass: 'i-excused' }
      ];

      const container = document.getElementById('stats');
      container.innerHTML = cards.map(card => `
        <div class="stat">
          <div>
            <div class="name">${card.name}</div>
            <div class="count ${card.countClass}">${card.count}</div>
          </div>
          <div class="icon ${card.iconClass}">${card.icon}</div>
        </div>
      `).join('');
    }

    function renderTable() {
      const tbody = document.getElementById('attendanceRows');
      tbody.innerHTML = students.map((student, index) => `
        <tr>
          <td>${student.id}</td>
          <td>${student.name}</td>
          <td>${student.time}</td>
          <td><span class="badge ${getStatusClass(student.status)}">${getStatusLabel(student.status)}</span></td>
          <td>${student.note}</td>
          <td>
            ${student.status === 'absent' ? `<button class="presence-btn" onclick="markPresent(${index})">Mark Present ✓</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    async function markPresent(index) {
      const target = students[index];
      const lectureId = getLectureId();
      if (!target || !lectureId) return;

      if (isSupabaseMode() && !isUuid(lectureId)) {
        alert('This lecture ID is not a valid UUID for Supabase. Open a synced lecture and regenerate data.');
        return;
      }

      if (isSupabaseMode()) {
        const response = await fetch(`${getSupabaseRestBase()}/attendance?on_conflict=lecture_id,student_id`, {
          method: 'POST',
          headers: {
            ...getSupabaseHeaders(),
            Prefer: 'resolution=merge-duplicates,return=representation'
          },
          body: JSON.stringify([{
            lecture_id: lectureId,
            student_id: target.id,
            student_name: target.name,
            status: 'present',
            note: '-'
          }])
        });

        if (!response.ok) {
          alert('Failed to update attendance status.');
          return;
        }

        await loadAttendance();
        return;
      }

      const response = await fetch(`${getApiBase()}/api/attendance/mark`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          lectureId,
          studentId: target.id,
          studentName: target.name,
          status: 'present'
        })
      });

      if (!response.ok) {
        alert('Failed to update attendance status.');
        return;
      }

      await loadAttendance();
    }

    function exportTable() {
      const headers = ['Student ID', 'Student Name', 'Check-in Time', 'Status', 'Notes'];
      const rows = students.map((student) => [
        student.id,
        student.name,
        student.time,
        getStatusLabel(student.status),
        student.note
      ]);

      const csv = [headers, ...rows]
        .map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'attendance.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function parseTimeToday(value) {
      if (!value || typeof value !== 'string' || !/^\d{2}:\d{2}$/.test(value)) return null;
      const [hours, minutes] = value.split(':').map(Number);
      if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;

      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0, 0);
    }

    function formatRemaining(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      const hh = String(hours).padStart(2, '0');
      const mm = String(minutes).padStart(2, '0');
      const ss = String(seconds).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    }

    function updateLectureTimer() {
      const timerEl = document.getElementById('lectureTimer');
      if (!timerEl) return;
      if (!lecture || !lecture.startTime || !lecture.endTime) {
        timerEl.textContent = 'Timer: unavailable';
        return;
      }

      const startAt = parseTimeToday(lecture.startTime);
      const endAt = parseTimeToday(lecture.endTime);

      if (!startAt || !endAt || endAt <= startAt) {
        timerEl.textContent = 'Timer: invalid schedule';
        return;
      }

      const now = new Date();
      if (now < startAt) {
        timerEl.textContent = `Starts in ${formatRemaining(startAt - now)}`;
        return;
      }

      if (now >= startAt && now < endAt) {
        timerEl.textContent = `Ends in ${formatRemaining(endAt - now)}`;
        return;
      }

      timerEl.textContent = 'Lecture ended';
    }

    function startLectureTimer() {
      if (lectureTimerIntervalId) {
        clearInterval(lectureTimerIntervalId);
      }

      updateLectureTimer();
      lectureTimerIntervalId = setInterval(updateLectureTimer, 1000);
    }

    function initHeader() {
      document.getElementById('subjectTitle').textContent = subjectName;
      document.getElementById('subjectCrumb').textContent = subjectName;

      if (lecture) {
        document.getElementById('roomChip').textContent = `${lecture.roomNumber} 📍`;
        document.getElementById('lectureTime').textContent = `${lecture.startTime} - ${lecture.endTime} 🕒`;
      }

      document.getElementById('sessionNumber').textContent = lecture && lecture.sessionNumber ? String(lecture.sessionNumber) : '1';
      startLectureTimer();
    }

    initHeader();
    loadAttendance();

    window.addEventListener('beforeunload', () => {
      if (lectureTimerIntervalId) {
        clearInterval(lectureTimerIntervalId);
      }
    });
  </script>
</body>
</html>
