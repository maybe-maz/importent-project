<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance</title>
  <style>
    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      background: #eef1f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .panel {
      width: 100%;
      max-width: 840px;
      padding: 10px;
      text-align: center;
      direction: ltr;
    }

    h1 {
      margin: 0;
      color: #16274a;
      font-size: 34px;
      text-align: center;
      font-weight: 800;
    }

    .sub {
      margin-top: 6px;
      margin-bottom: 22px;
      color: #6e819d;
      font-size: 16px;
      text-align: center;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: #ffffff;
      border: 2px solid #dde3ec;
      border-radius: 14px;
      min-height: 220px;
      padding: 14px;
      box-shadow: 0 4px 10px rgba(26, 43, 73, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      text-align: center;
      box-sizing: border-box;
    }

    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 14px;
      left: 14px;
      color: #1b2f56;
      font-size: 21px;
      font-weight: bold;
    }

    .doctor .icon-wrap {
      background: #edf0f5;
    }

    .student .icon-wrap {
      background: #e7f5ff;
      color: #0b87d9;
    }

    .card h2 {
      margin-top: 52px;
      margin-bottom: 0;
      color: #0f1f3f;
      font-size: 28px;
      font-weight: 800;
    }

    .en {
      margin-top: 6px;
      color: #6b7f9b;
      font-size: 14px;
      direction: ltr;
    }

    .desc {
      margin: 12px 0 14px;
      color: #6b7f9b;
      font-size: 14px;
      line-height: 1.3;
      min-height: 52px;
    }

    .btn {
      border: none;
      border-radius: 9px;
      height: 38px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: filter 0.2s ease;
    }

    .btn:hover {
      filter: brightness(0.96);
    }

    .btn-doctor {
      background: #1b2f56;
      color: #ffffff;
    }

    .btn-student {
      background: #ffffff;
      color: #2f3f5f;
      border: 2px solid #d9dee7;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 28px;
      }

      .sub {
        font-size: 14px;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .card h2 {
        font-size: 24px;
      }

      .en {
        font-size: 13px;
      }

      .desc {
        font-size: 13px;
        min-height: 40px;
      }

      .btn {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Smart Attendance System</h1>
    <div class="sub">Smart Attendance System</div>

    <div class="options">
      <div class="card doctor">
        <div class="icon-wrap">📖</div>
        <div>
          <h2>Professor</h2>
          <div class="en">(Professor)</div>
          <div class="desc">Manage subjects, create sessions, and view attendance reports.</div>
        </div>
        <button class="btn btn-doctor" onclick="showRole('Doctor')">Professor Login</button>
      </div>

      <div class="card student">
        <div class="icon-wrap">🎓</div>
        <div>
          <h2>Student</h2>
          <div class="en">(Student)</div>
          <div class="desc">Scan the QR code and submit your attendance for sessions.</div>
        </div>
        <button class="btn btn-student" onclick="showRole('Student')">How to Use</button>
      </div>
    </div>
  </div>

  <script>
    function showRole(role) {
      sessionStorage.setItem('pageHistory', JSON.stringify(['Home']));

      if (role === 'Doctor') {
        window.location.href = 'doctor.html';
      } else if (role === 'Student') {
        alert('Student flow: scan the lecture QR code from the professor, then the check-in page will open automatically.');
      }
    }
  </script>
</body>
</html>
