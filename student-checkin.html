<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Check-in</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #eff6ff, #f8fbff);
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
      color: #0f172a;
    }

    .panel {
      max-width: 480px;
      margin: 10px auto;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fbff;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      color: #1d4ed8;
    }

    .sub {
      margin-top: 6px;
      color: #64748b;
      font-size: 13px;
    }

    .body {
      padding: 16px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .label {
      color: #64748b;
    }

    .value {
      font-weight: bold;
      color: #0f172a;
      text-align: right;
    }

    .field {
      margin-top: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: #2563eb;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      font-size: 13px;
      color: #0f766e;
      background: #ecfeff;
      border: 1px solid #99f6e4;
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }

    .warn {
      margin-top: 10px;
      font-size: 12px;
      color: #9a3412;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <h1>Student Check-in</h1>
      <div class="sub">Opened from lecture QR</div>
    </div>
    <div class="body">
      <div class="row"><div class="label">Subject</div><div class="value" id="subject">-</div></div>
      <div class="row"><div class="label">Doctor</div><div class="value" id="doctor">-</div></div>
      <div class="row"><div class="label">Room</div><div class="value" id="room">-</div></div>
      <div class="row"><div class="label">Time</div><div class="value" id="time">-</div></div>

      <div class="field">
        <label for="studentId">Student ID</label>
        <input id="studentId" type="text" placeholder="Enter your student ID" />
      </div>

      <div class="field">
        <label for="studentName">Student Name</label>
        <input id="studentName" type="text" placeholder="Enter your name" />
      </div>

      <div class="field" id="passwordField">
        <label for="password">Lecture Password</label>
        <input id="password" type="password" placeholder="Enter lecture password" />
      </div>

      <button class="btn" onclick="submitCheckin()">Submit Check-in</button>
      <div class="msg" id="successMsg">Check-in submitted successfully.</div>
      <div class="warn" id="passwordRule">Password is only required if check-in is after 15 minutes from lecture start.</div>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const lectureId = params.get('lectureId') || '';
    const subject = params.get('subject') || '-';
    const doctor = params.get('doctor') || '-';
    const room = params.get('room') || '-';
    const start = params.get('start') || '--:--';
    const end = params.get('end') || '--:--';
    const API_BASE_STORAGE_KEY = 'attendanceApiBaseUrl';
    const SUPABASE_ANON_KEY_STORAGE_KEY = 'attendanceSupabaseAnonKey';
    const CHECKIN_LOCK_PREFIX = 'checkinLock';
    const CHECKIN_META_PREFIX = 'checkinMeta';
    const NEXT_PAGE = 'student-checkin-next.html';
    let lectureStartTime = decodeURIComponent(start);
    let passwordUiTimerId = null;

    document.getElementById('subject').textContent = decodeURIComponent(subject);
    document.getElementById('doctor').textContent = decodeURIComponent(doctor);
    document.getElementById('room').textContent = decodeURIComponent(room);
    document.getElementById('time').textContent = `${decodeURIComponent(start)} - ${decodeURIComponent(end)}`;

    function normalizeApiBase(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function inferApiBaseFromAnonKey() {
      const rawKey = (params.get('sbKey') || localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
      if (!rawKey || rawKey.split('.').length < 2) return '';

      try {
        const payloadPart = rawKey.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        const padded = payloadPart.padEnd(payloadPart.length + ((4 - (payloadPart.length % 4)) % 4), '=');
        const json = atob(padded);
        const payload = JSON.parse(json);
        const iss = String(payload.iss || '').trim();
        if (!iss) return '';

        return normalizeApiBase(iss.replace(/\/auth\/v1\/?$/, ''));
      } catch {
        return '';
      }
    }

    function getApiBase() {
      const fromQuery = normalizeApiBase(params.get('apiBase') || '');
      if (fromQuery) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromStorage = normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY) || '');
      if (fromStorage) return fromStorage;

      const fromConfig = normalizeApiBase((window.APP_CONFIG && window.APP_CONFIG.apiBase) || '');
      if (fromConfig) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      const fromSbKey = inferApiBaseFromAnonKey();
      if (fromSbKey) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromSbKey);
        return fromSbKey;
      }

      return '';
    }

    function getSupabaseRestBase() {
      const base = getApiBase();
      if (!base) return '';
      if (base.includes('/rest/v1')) return base;
      if (base.includes('.supabase.co')) return `${base}/rest/v1`;
      return '';
    }

    function getSupabaseAnonKey() {
      const fromQuery = (params.get('sbKey') || '').trim();
      if (fromQuery) {
        localStorage.setItem(SUPABASE_ANON_KEY_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromStorage = (localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
      if (fromStorage) return fromStorage;

      const fromConfig = ((window.APP_CONFIG && window.APP_CONFIG.supabaseAnonKey) || '').trim();
      if (fromConfig) {
        localStorage.setItem(SUPABASE_ANON_KEY_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      return '';
    }

    function buildNextPageUrl(studentId, studentName) {
      const search = new URLSearchParams({
        lectureId,
        studentId: studentId || '',
        studentName: studentName || ''
      });

      const apiBase = getApiBase();
      const sbKey = getSupabaseAnonKey();
      if (apiBase) search.set('apiBase', apiBase);
      if (sbKey) search.set('sbKey', sbKey);

      return `${NEXT_PAGE}?${search.toString()}`;
    }

    function isSupabaseMode() {
      return !!(getSupabaseRestBase() && getSupabaseAnonKey());
    }

    function isUuid(value) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test((value || '').trim());
    }

    function getSupabaseHeaders() {
      const key = getSupabaseAnonKey();
      return {
        'Content-Type': 'application/json',
        apikey: key,
        Authorization: `Bearer ${key}`
      };
    }

    function extractHhmm(value) {
      const match = String(value || '').match(/^(\d{2}:\d{2})/);
      return match ? match[1] : '';
    }

    function minutesFromLectureStart() {
      const hhmm = extractHhmm(lectureStartTime);
      if (!hhmm) return 0;

      const [h, m] = hhmm.split(':').map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return 0;

      const now = new Date();
      const startAt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
      return (now.getTime() - startAt.getTime()) / 60000;
    }

    function isPasswordRequiredNow() {
      return minutesFromLectureStart() > 15;
    }

    function updatePasswordRequirementUi() {
      const field = document.getElementById('passwordField');
      const rule = document.getElementById('passwordRule');
      const isRequired = isPasswordRequiredNow();

      if (isRequired) {
        field.style.display = 'block';
        rule.textContent = 'Password is required now because check-in is after 15 minutes.';
        return;
      }

      field.style.display = 'none';
      document.getElementById('password').value = '';
      rule.textContent = 'No password needed within the first 15 minutes.';
    }

    function getCheckinLockKey() {
      return `${CHECKIN_LOCK_PREFIX}::${lectureId}`;
    }

    function getCheckinMetaKey() {
      return `${CHECKIN_META_PREFIX}::${lectureId}`;
    }

    function markCheckinDone(studentId, studentName) {
      if (!lectureId) return;
      localStorage.setItem(getCheckinLockKey(), '1');
      localStorage.setItem(getCheckinMetaKey(), JSON.stringify({ studentId, studentName }));
    }

    function hasCheckedInOnThisDevice() {
      if (!lectureId) return false;
      return localStorage.getItem(getCheckinLockKey()) === '1';
    }

    function redirectIfAlreadyCheckedIn() {
      if (!hasCheckedInOnThisDevice()) return;
      let studentId = '';
      let studentName = '';
      try {
        const stored = JSON.parse(localStorage.getItem(getCheckinMetaKey()) || '{}');
        studentId = stored.studentId || '';
        studentName = stored.studentName || '';
      } catch {
      }

      const nextUrl = buildNextPageUrl(studentId, studentName);
      window.location.replace(nextUrl);
    }

    async function hydrateLectureDetails() {
      if (!lectureId) return;

      try {
        if (isSupabaseMode()) {
          if (!isUuid(lectureId)) return;

          const response = await fetch(`${getSupabaseRestBase()}/lectures?id=eq.${encodeURIComponent(lectureId)}&select=*`, {
            headers: getSupabaseHeaders()
          });
          if (!response.ok) return;

          const rows = await response.json();
          const data = Array.isArray(rows) && rows.length ? rows[0] : null;
          if (!data) return;

          document.getElementById('subject').textContent = data.subject || '-';
          document.getElementById('doctor').textContent = data.doctor || '-';
          document.getElementById('room').textContent = data.room_number || data.roomNumber || '-';
          lectureStartTime = data.start_time || data.startTime || lectureStartTime;
          document.getElementById('time').textContent = `${data.start_time || data.startTime || '--:--'} - ${data.end_time || data.endTime || '--:--'}`;
          updatePasswordRequirementUi();
          return;
        }

        const response = await fetch(`${getApiBase()}/api/lectures/${encodeURIComponent(lectureId)}`);
        if (!response.ok) return;

        const data = await response.json();
        document.getElementById('subject').textContent = data.subject || '-';
        document.getElementById('doctor').textContent = data.doctor || '-';
        document.getElementById('room').textContent = data.roomNumber || '-';
        lectureStartTime = data.startTime || lectureStartTime;
        document.getElementById('time').textContent = `${data.startTime || '--:--'} - ${data.endTime || '--:--'}`;
        updatePasswordRequirementUi();
      } catch {
      }
    }

    async function submitCheckin() {
      const id = document.getElementById('studentId').value.trim();
      const name = document.getElementById('studentName').value.trim();
      const password = document.getElementById('password').value.trim();
      const passwordRequired = isPasswordRequiredNow();

      if (!id || !name) {
        alert('Please fill student ID and student name.');
        return;
      }

      if (passwordRequired && !password) {
        alert('Password is required after 15 minutes from lecture start.');
        return;
      }

      if (!lectureId) {
        alert('Lecture is not identified in QR link.');
        return;
      }

      if (!getApiBase() && window.location.hostname.includes('github.io')) {
        alert('Backend API is not configured. Ask doctor to regenerate QR after setting API URL.');
        return;
      }

      if (getApiBase().includes('supabase.co') && !getSupabaseAnonKey()) {
        alert('Supabase anon key is missing. Ask doctor to set Supabase Key and regenerate QR.');
        return;
      }

      if (isSupabaseMode() && !isUuid(lectureId)) {
        alert('This QR uses an old lecture ID format. Ask doctor to regenerate the QR from a synced lecture.');
        return;
      }

      if (isSupabaseMode()) {
        const response = await fetch(`${getSupabaseRestBase()}/rpc/checkin_student`, {
          method: 'POST',
          headers: getSupabaseHeaders(),
          body: JSON.stringify({
            p_lecture_id: lectureId,
            p_student_id: id,
            p_student_name: name,
            p_password: password || null
          })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({ message: 'Check-in failed.' }));
          alert(payload.message || payload.error || 'Check-in failed.');
          return;
        }

        markCheckinDone(id, name);
        const msg = document.getElementById('successMsg');
        msg.style.display = 'block';
        setTimeout(() => {
          window.location.href = buildNextPageUrl(id, name);
        }, 700);
        return;
      }

      const response = await fetch(`${getApiBase()}/api/checkin`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          lectureId,
          studentId: id,
          studentName: name,
          password: password || null
        })
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({ message: 'Check-in failed.' }));
        alert(payload.message || 'Check-in failed.');
        return;
      }

      markCheckinDone(id, name);
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => {
        window.location.href = buildNextPageUrl(id, name);
      }, 700);
    }

    redirectIfAlreadyCheckedIn();
    updatePasswordRequirementUi();
    passwordUiTimerId = setInterval(updatePasswordRequirementUi, 30000);
    hydrateLectureDetails();

    window.addEventListener('beforeunload', () => {
      if (passwordUiTimerId) {
        clearInterval(passwordUiTimerId);
      }
    });
  </script>
</body>
</html>
