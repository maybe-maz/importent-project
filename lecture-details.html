<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      max-width: 560px;
      margin: 20px auto;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #2563eb;
      font-size: 24px;
    }

    .sub {
      margin-top: -8px;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .item {
      margin-bottom: 10px;
      color: #0f172a;
      font-size: 15px;
    }

    .label {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .box {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 12px;
    }

    .qr-wrap {
      border-top: 1px solid #e2e8f0;
      margin-top: 6px;
      padding-top: 16px;
      text-align: center;
    }

    .qr-title {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 16px;
      font-weight: bold;
    }

    .qr-box {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      width: 240px;
      height: 240px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-box img {
      width: 220px;
      height: 220px;
      object-fit: contain;
    }

    .hint {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
    }

    .link-box {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .link-box input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #334155;
      background: white;
    }

    .mini-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    .back-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lecture Details</h1>
    <p class="sub">Scan QR for attendance.</p>

    <div class="grid">
      <div class="box item">
        <div class="label">Room Number</div>
        <div id="roomNumber">-</div>
      </div>
      <div class="box item">
        <div class="label">Start Time</div>
        <div id="startTime">-</div>
      </div>
      <div class="box item">
        <div class="label">End Time</div>
        <div id="endTime">-</div>
      </div>
      <div class="box item">
        <div class="label">Password</div>
        <div id="password">-</div>
      </div>
    </div>

    <div class="qr-wrap">
      <p class="qr-title">Lecture QR</p>
      <div class="qr-box">
        <img id="qrImage" alt="Lecture QR Code" />
      </div>
      <div class="hint" id="qrHint">QR is generated from lecture data.</div>
      <div class="link-box">
        <input id="checkinLink" type="text" readonly value="" />
        <button class="mini-btn" onclick="configureApiBase()">API URL</button>
        <button class="mini-btn" onclick="configureSupabaseKey()">Supabase Key</button>
        <button class="mini-btn" onclick="copyCheckinLink()">Copy Link</button>
      </div>
    </div>

    <div class="actions">
      <button class="secondary-btn" onclick="goBackToSubject()">Back</button>
      <button class="back-btn" onclick="downloadQr()">Download QR</button>
    </div>
  </div>

  <script>
    const lecture = JSON.parse(sessionStorage.getItem('selectedLecture') || 'null');
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject');
    const doctor = params.get('doctor');
    const API_BASE_STORAGE_KEY = 'attendanceApiBaseUrl';
    const SUPABASE_ANON_KEY_STORAGE_KEY = 'attendanceSupabaseAnonKey';
    let latestCheckinLink = '';

    function goBackToSubject() {
      if (subject && doctor) {
        window.location.href = `subject-details.html?subject=${encodeURIComponent(subject)}&doctor=${encodeURIComponent(doctor)}`;
        return;
      }
      window.location.href = 'subject-details.html';
    }

    function getBaseUrl() {
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        const origin = `${window.location.protocol}//${window.location.host}`;
        const currentPath = window.location.pathname || '/';
        const lastSlashIndex = currentPath.lastIndexOf('/');
        const appBasePath = lastSlashIndex >= 0 ? currentPath.slice(0, lastSlashIndex) : '';
        return `${origin}${appBasePath}`;
      }

      // Fallback for file:// preview; user should host files for real mobile scanning.
      return 'http://YOUR-PC-IP:5500';
    }

    function normalizeApiBase(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function getApiBase() {
      return normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY) || '');
    }

    function getSupabaseAnonKey() {
      return (localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
    }

    function configureApiBase() {
      const current = getApiBase();
      const value = prompt('Enter backend API base URL (example: https://your-api.onrender.com)', current);
      if (value === null) return;

      const normalized = normalizeApiBase(value);
      if (!normalized) {
        localStorage.removeItem(API_BASE_STORAGE_KEY);
      } else {
        localStorage.setItem(API_BASE_STORAGE_KEY, normalized);
      }

      if (!lecture) return;
      const qrValue = buildCheckinUrl(lecture);
      latestCheckinLink = qrValue;
      document.getElementById('checkinLink').value = qrValue;
      document.getElementById('qrImage').src = buildQrUrl(qrValue);
    }

    function configureSupabaseKey() {
      const current = getSupabaseAnonKey();
      const value = prompt('Enter Supabase anon key (public key)', current);
      if (value === null) return;

      const normalized = value.trim();
      if (!normalized) {
        localStorage.removeItem(SUPABASE_ANON_KEY_STORAGE_KEY);
      } else {
        localStorage.setItem(SUPABASE_ANON_KEY_STORAGE_KEY, normalized);
      }

      if (!lecture) return;
      const qrValue = buildCheckinUrl(lecture);
      latestCheckinLink = qrValue;
      document.getElementById('checkinLink').value = qrValue;
      document.getElementById('qrImage').src = buildQrUrl(qrValue);
    }

    function buildCheckinUrl(data) {
      const baseUrl = getBaseUrl();
      const apiBase = getApiBase();
      const supabaseKey = getSupabaseAnonKey();
      const search = new URLSearchParams({
        lectureId: data.id || '',
        subject: subject || '',
        doctor: doctor || '',
        room: data.roomNumber || '-',
        start: data.startTime || '-',
        end: data.endTime || '-'
      });

      if (apiBase) {
        search.set('apiBase', apiBase);
      }

      if (supabaseKey) {
        search.set('sbKey', supabaseKey);
      }

      return `${baseUrl}/student-checkin.html?${search.toString()}`;
    }

    function buildQrUrl(text) {
      const encoded = encodeURIComponent(text);
      return `https://quickchart.io/qr?text=${encoded}&size=300&margin=2`;
    }

    function copyCheckinLink() {
      if (!latestCheckinLink) return;
      navigator.clipboard.writeText(latestCheckinLink)
        .then(() => {
          const hint = document.getElementById('qrHint');
          if (hint) hint.textContent = 'Check-in link copied.';
        })
        .catch(() => {
          const input = document.getElementById('checkinLink');
          if (!input) return;
          input.select();
          document.execCommand('copy');
        });
    }

    function downloadQr() {
      const image = document.getElementById('qrImage');
      if (!image || !image.src) return;
      const link = document.createElement('a');
      link.href = image.src;
      link.download = 'lecture-qr.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    if (lecture) {
      document.getElementById('roomNumber').textContent = lecture.roomNumber || '-';
      document.getElementById('startTime').textContent = lecture.startTime || '-';
      document.getElementById('endTime').textContent = lecture.endTime || '-';
      document.getElementById('password').textContent = lecture.password || '-';

      const qrValue = buildCheckinUrl(lecture);
      latestCheckinLink = qrValue;
      document.getElementById('checkinLink').value = qrValue;
      document.getElementById('qrImage').src = buildQrUrl(qrValue);
      if (window.location.protocol === 'file:') {
        document.getElementById('qrHint').textContent = 'For phone scanning, run with Live Server and replace YOUR-PC-IP in link.';
      } else if (window.location.hostname.includes('github.io') && (!getApiBase() || !getSupabaseAnonKey())) {
        document.getElementById('qrHint').textContent = 'Set API URL and Supabase Key first so student check-in can be saved.';
      } else {
        document.getElementById('qrHint').textContent = 'Students can scan this QR to open check-in page on phone.';
      }
    } else {
      const qrHint = document.getElementById('qrHint');
      const qrImage = document.getElementById('qrImage');
      if (qrHint) qrHint.textContent = 'No lecture selected yet.';
      if (qrImage) qrImage.alt = 'No lecture data';
    }
  </script>
</body>
</html>
