<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      max-width: 560px;
      margin: 20px auto;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #2563eb;
      font-size: 24px;
    }

    .sub {
      margin-top: -8px;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .item {
      margin-bottom: 10px;
      color: #0f172a;
      font-size: 15px;
    }

    .label {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .box {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 12px;
    }

    .qr-wrap {
      border-top: 1px solid #e2e8f0;
      margin-top: 6px;
      padding-top: 16px;
      text-align: center;
    }

    .qr-title {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 16px;
      font-weight: bold;
    }

    .qr-box {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      width: 240px;
      height: 240px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-box img {
      width: 220px;
      height: 220px;
      object-fit: contain;
    }

    .hint {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
    }

    .link-box {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .link-box input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #334155;
      background: white;
    }

    .mini-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    .back-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lecture Details</h1>
    <p class="sub">Scan QR for attendance.</p>

    <div class="grid">
      <div class="box item">
        <div class="label">Room Number</div>
        <div id="roomNumber">-</div>
      </div>
      <div class="box item">
        <div class="label">Start Time</div>
        <div id="startTime">-</div>
      </div>
      <div class="box item">
        <div class="label">End Time</div>
        <div id="endTime">-</div>
      </div>
      <div class="box item">
        <div class="label">Password</div>
        <div id="password">-</div>
      </div>
    </div>

    <div class="qr-wrap">
      <p class="qr-title">Lecture QR</p>
      <div class="qr-box">
        <img id="qrImage" alt="Lecture QR Code" />
      </div>
      <div class="hint" id="qrHint">QR is generated from lecture data.</div>
      <div class="link-box">
        <input id="checkinLink" type="text" readonly value="" />
        <button class="mini-btn" onclick="copyCheckinLink()">Copy Link</button>
      </div>
    </div>

    <div class="actions">
      <button class="secondary-btn" onclick="goBackToSubject()">Back</button>
      <button class="back-btn" onclick="downloadQr()">Download QR</button>
    </div>
  </div>

  <script src="app-config.js?v=3"></script>
  <script>
    const lecture = JSON.parse(sessionStorage.getItem('selectedLecture') || 'null');
    const params = new URLSearchParams(window.location.search);
    const subject = params.get('subject');
    const doctor = params.get('doctor');
    const API_BASE_STORAGE_KEY = 'attendanceApiBaseUrl';
    const SUPABASE_ANON_KEY_STORAGE_KEY = 'attendanceSupabaseAnonKey';
    const GATE_API_BASE_STORAGE_KEY = 'attendanceGateApiBaseUrl';
    const GATE_MODE_STORAGE_KEY = 'attendanceGateMode';
    const ESP_GATE_URL_STORAGE_KEY = 'attendanceEspGateUrl';
    let latestCheckinLink = '';

    function goBackToSubject() {
      if (subject && doctor) {
        window.location.href = `subject-details.html?subject=${encodeURIComponent(subject)}&doctor=${encodeURIComponent(doctor)}`;
        return;
      }
      window.location.href = 'subject-details.html';
    }

    function getBaseUrl() {
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        const origin = `${window.location.protocol}//${window.location.host}`;
        const currentPath = window.location.pathname || '/';
        const lastSlashIndex = currentPath.lastIndexOf('/');
        const appBasePath = lastSlashIndex >= 0 ? currentPath.slice(0, lastSlashIndex) : '';
        return `${origin}${appBasePath}`;
      }

      // Fallback for file:// preview; user should host files for real mobile scanning.
      return 'http://YOUR-PC-IP:5500';
    }

    function normalizeApiBase(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function inferApiBaseFromAnonKey() {
      const rawKey = (params.get('sbKey') || localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
      if (!rawKey || rawKey.split('.').length < 2) return '';

      try {
        const payloadPart = rawKey.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        const padded = payloadPart.padEnd(payloadPart.length + ((4 - (payloadPart.length % 4)) % 4), '=');
        const json = atob(padded);
        const payload = JSON.parse(json);
        const iss = String(payload.iss || '').trim();
        if (!iss) return '';

        return normalizeApiBase(iss.replace(/\/auth\/v1\/?$/, ''));
      } catch {
        return '';
      }
    }

    function getApiBase() {
      const fromQuery = normalizeApiBase(params.get('apiBase') || '');
      if (fromQuery) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromStorage = normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY) || '');
      if (fromStorage) return fromStorage;

      const fromConfig = normalizeApiBase((window.APP_CONFIG && window.APP_CONFIG.apiBase) || '');
      if (fromConfig) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      const fromSbKey = inferApiBaseFromAnonKey();
      if (fromSbKey) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromSbKey);
        return fromSbKey;
      }

      return '';
    }

    function getSupabaseAnonKey() {
      const fromQuery = (params.get('sbKey') || '').trim();
      if (fromQuery) {
        localStorage.setItem(SUPABASE_ANON_KEY_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromConfig = ((window.APP_CONFIG && window.APP_CONFIG.supabaseAnonKey) || '').trim();
      if (fromConfig) {
        localStorage.setItem(SUPABASE_ANON_KEY_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      return (localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
    }

    function normalizeUrl(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function getGateApiBase() {
      const fromQuery = normalizeUrl(params.get('gateApiBase') || '');
      if (fromQuery) {
        localStorage.setItem(GATE_API_BASE_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromStorage = normalizeUrl(localStorage.getItem(GATE_API_BASE_STORAGE_KEY) || '');
      if (fromStorage) return fromStorage;

      const fromConfig = normalizeUrl((window.APP_CONFIG && window.APP_CONFIG.gateApiBase) || '');
      if (fromConfig) {
        localStorage.setItem(GATE_API_BASE_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      return '';
    }

    function getGateMode() {
      const fromQuery = String(params.get('gateMode') || '').trim().toLowerCase();
      if (fromQuery === 'token') {
        localStorage.setItem(GATE_MODE_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      const fromStorage = String(localStorage.getItem(GATE_MODE_STORAGE_KEY) || '').trim().toLowerCase();
      if (fromStorage === 'token') return fromStorage;

      const fromConfig = String((window.APP_CONFIG && window.APP_CONFIG.gateMode) || '').trim().toLowerCase();
      if (fromConfig === 'token') {
        localStorage.setItem(GATE_MODE_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      return 'token';
    }

    function getEspGateUrl() {
      const fromConfig = normalizeUrl((window.APP_CONFIG && window.APP_CONFIG.espGateUrl) || '');
      if (fromConfig) {
        localStorage.setItem(ESP_GATE_URL_STORAGE_KEY, fromConfig);
        return fromConfig;
      }

      const fromStorage = normalizeUrl(localStorage.getItem(ESP_GATE_URL_STORAGE_KEY) || '');
      if (fromStorage) return fromStorage;

      const fromQuery = normalizeUrl(params.get('espGateUrl') || '');
      if (fromQuery) {
        localStorage.setItem(ESP_GATE_URL_STORAGE_KEY, fromQuery);
        return fromQuery;
      }

      return '';
    }


    async function buildCheckinUrl(data) {
      // For Captive Portal: direct link to ESP32 AP
      return 'http://192.168.4.1/';
    }

    function buildQrUrl(text) {
      const encoded = encodeURIComponent(text);
      return `https://quickchart.io/qr?text=${encoded}&size=300&margin=2`;
    }

    function copyCheckinLink() {
      if (!latestCheckinLink) return;
      navigator.clipboard.writeText(latestCheckinLink)
        .then(() => {
          const hint = document.getElementById('qrHint');
          if (hint) hint.textContent = 'Check-in link copied.';
        })
        .catch(() => {
          const input = document.getElementById('checkinLink');
          if (!input) return;
          input.select();
          document.execCommand('copy');
        });
    }

    function downloadQr() {
      const image = document.getElementById('qrImage');
      if (!image || !image.src) return;
      const link = document.createElement('a');
      link.href = image.src;
      link.download = 'lecture-qr.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function renderLectureQr() {
      if (!lecture) {
        const qrHint = document.getElementById('qrHint');
        const qrImage = document.getElementById('qrImage');
        if (qrHint) qrHint.textContent = 'No lecture selected yet.';
        if (qrImage) qrImage.alt = 'No lecture data';
        return;
      }

      document.getElementById('roomNumber').textContent = lecture.roomNumber || '-';
      document.getElementById('startTime').textContent = lecture.startTime || '-';
      document.getElementById('endTime').textContent = lecture.endTime || '-';
      document.getElementById('password').textContent = lecture.password || '-';

      const qrValue = await buildCheckinUrl(lecture);
      latestCheckinLink = qrValue;
      document.getElementById('checkinLink').value = qrValue;
      document.getElementById('qrImage').src = buildQrUrl(qrValue);

      if (window.location.protocol === 'file:') {
        document.getElementById('qrHint').textContent = 'For phone scanning, run with Live Server and replace YOUR-PC-IP in link.';
      } else {
        document.getElementById('qrHint').textContent = 'Students can scan this QR to open check-in page on phone.';
      }
    }

    renderLectureQr();
  </script>
</body>
</html>
