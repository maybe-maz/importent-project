<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Page</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #eef1f6;
      min-height: 100vh;
      padding: 18px;
      box-sizing: border-box;
    }

    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .breadcrumb-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 6px;
      padding: 0;
      font-size: 13px;
      color: #7387a3;
    }

    .crumb-link {
      color: #7b8ea8;
      text-decoration: none;
      font-weight: 600;
    }

    .crumb-current {
      color: #2563eb;
      font-weight: 700;
    }

    .crumb-sep {
      color: #94a3b8;
      margin: 0 2px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
      padding: 2px 0;
    }

    .top-left {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      background: #1b2f56;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn.secondary {
      background: #16a34a;
    }

    .content {
      text-align: right;
      color: #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #1a2f55;
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 14px;
      color: #7a8da8;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .popup-box {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: min(92vw, 360px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .popup-box h2 {
      margin-top: 0;
      margin-bottom: 0;
      color: #2563eb;
      font-size: 20px;
    }

    .popup-close {
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .popup-close:hover {
      background: #f1f5f9;
      color: #0f172a;
    }

    .popup-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .popup-box button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .subject-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 360px));
      gap: 18px;
      width: min(100%, 930px);
      justify-content: start;
      align-items: start;
      direction: rtl;
    }

    .subject-item {
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      min-height: 130px;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      position: relative;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      direction: ltr;
    }

    .subject-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
      border-color: #d1dae8;
    }

    .subject-title {
      margin: 0;
      font-size: 24px;
      color: #16274a;
      font-weight: 800;
      line-height: 1.2;
      text-align: right;
      word-break: break-word;
    }

    .meta-row {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: #7e91aa;
      line-height: 1.2;
    }

    .meta-icon {
      width: 18px;
      text-align: center;
    }

    .subject-actions {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 6px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: all 0.2s ease;
    }

    .subject-item:hover .subject-actions,
    .subject-item:focus-within .subject-actions {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .subject-actions button {
      border: 1px solid rgba(37, 99, 235, 0.25);
      border-radius: 8px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 13px;
      color: rgba(37, 99, 235, 0.9);
      background: transparent;
      line-height: 1;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .delete-btn {
      color: rgba(220, 38, 38, 0.9);
      border-color: rgba(220, 38, 38, 0.25);
    }

    .empty {
      color: #6f839f;
      font-size: 15px;
      padding: 12px 6px;
    }

    @media (max-width: 920px) {
      h1 {
        font-size: 24px;
      }

      .subject-list {
        grid-template-columns: 1fr;
      }

      .subject-title {
        font-size: 18px;
      }

      .meta-row {
        font-size: 13px;
      }

      .btn {
        font-size: 13px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="breadcrumb-bar" id="breadcrumb"></div>

    <div class="topbar">
      <div class="top-left">
        <button class="btn" onclick="openPopup()">+ Add Subject</button>
      </div>

      <div class="content">
        <h1>Doctor Dashboard</h1>
        <p>Manage subjects and sessions</p>
      </div>
    </div>

    <div class="subject-list" id="subjectList"></div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box">
      <div class="popup-header">
        <h2 id="popupTitle">Add Subject</h2>
        <button class="popup-close" onclick="closePopup()" aria-label="Close popup">×</button>
      </div>
      <input id="doctorName" type="text" placeholder="Doctor Name" />
      <input id="subjectName" type="text" placeholder="Subject Name" />
      <button onclick="saveSubject()">Save</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'doctorSubjects';
    const HISTORY_KEY = 'pageHistory';
    let editMode = false;
    let currentIndex = -1;
    let subjects = [];

    function loadSubjects() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
      } catch {
        return [];
      }
    }

    function saveSubjectsToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(subjects));
    }

    function getPageHistory() {
      try {
        return JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function setPageHistory(history) {
      sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function renderBreadcrumb() {
      const container = document.getElementById('breadcrumb');
      if (!container) return;

      const updatedHistory = ['Home', 'Doctor Dashboard'];
      setPageHistory(updatedHistory);

      container.innerHTML = updatedHistory.map((item, index) => {
        const isLast = index === updatedHistory.length - 1;
        if (isLast) {
          return `<span class="crumb-current">${item}</span>`;
        }

        const href = item === 'Home' ? 'indext.html?v=20260711' : 'doctor.html?v=20260711';
        return `<a class="crumb-link" href="${href}">${item}</a>`;
      }).join('<span class="crumb-sep">/</span>');
    }

    subjects = loadSubjects();
    renderBreadcrumb();
    renderSubjects();

    function openPopup(isEdit = false, index = -1) {
      editMode = isEdit;
      currentIndex = index;
      document.getElementById('popup').style.display = 'flex';
      document.getElementById('popupTitle').textContent = isEdit ? 'Edit Subject' : 'Add Subject';

      if (isEdit && index >= 0) {
        document.getElementById('doctorName').value = subjects[index].doctor;
        document.getElementById('subjectName').value = subjects[index].subject;
      } else {
        document.getElementById('doctorName').value = '';
        document.getElementById('subjectName').value = '';
      }
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }

    function saveSubject() {
      const doctor = document.getElementById('doctorName').value.trim();
      const subject = document.getElementById('subjectName').value.trim();

      if (!doctor || !subject) return;

      if (editMode && currentIndex >= 0) {
        subjects[currentIndex] = {
          ...subjects[currentIndex],
          doctor,
          subject,
          createdAt: subjects[currentIndex].createdAt || new Date().toISOString()
        };
      } else {
        subjects.push({
          doctor,
          subject,
          createdAt: new Date().toISOString()
        });
      }

      saveSubjectsToStorage();
      renderSubjects();
      closePopup();
      document.getElementById('doctorName').value = '';
      document.getElementById('subjectName').value = '';
    }

    function deleteSubject(index) {
      subjects.splice(index, 1);
      saveSubjectsToStorage();
      renderSubjects();
    }

    function renderSubjects() {
      const list = document.getElementById('subjectList');
      list.innerHTML = '';

      if (subjects.length === 0) {
        list.innerHTML = '<div class="empty">No subjects yet.</div>';
        return;
      }

      const formatDate = (value) => {
        const date = value ? new Date(value) : null;
        if (!date || Number.isNaN(date.getTime())) return '-';
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yyyy}/${mm}/${dd}`;
      };

      subjects.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'subject-item';
        const createdAt = formatDate(item.createdAt);
        div.innerHTML = `
          <div>
            <h3 class="subject-title">${item.subject}</h3>
            <div class="meta-row"><span>${item.doctor}</span><span class="meta-icon">👤</span></div>
            <div class="meta-row"><span>Created: ${createdAt}</span><span class="meta-icon">📅</span></div>
          </div>
          <div class="subject-actions">
            <button class="edit-btn" onclick="event.stopPropagation(); openPopup(true, ${index})" title="Edit">✏️</button>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteSubject(${index})" title="Delete">🗑️</button>
          </div>
        `;
        div.onclick = () => {
          const subjectName = encodeURIComponent(item.subject);
          const doctorName = encodeURIComponent(item.doctor);
          window.location.href = `subject-details.html?v=20260711&subject=${subjectName}&doctor=${doctorName}`;
        };
        list.appendChild(div);
      });
    }
  </script>
</body>
</html>
