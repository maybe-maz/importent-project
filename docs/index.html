<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الحضور الذكي</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .panel {
      background: #ffffff;
      width: 100%;
      max-width: 620px;
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 18px 45px rgba(37, 99, 235, 0.16);
      text-align: center;
      border: 1px solid #e6eefc;
    }

    .badge {
      display: inline-block;
      background: #e8f1ff;
      color: #2563eb;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 14px;
      letter-spacing: 0.4px;
    }

    h1 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 30px;
      text-align: center;
    }

    p {
      margin: 0 auto 24px;
      color: #64748b;
      font-size: 15px;
      text-align: center;
      max-width: 440px;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 20px 18px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      min-height: 110px;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-align: center;
    }

    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 24px rgba(15, 23, 42, 0.16);
    }

    .doctor {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
    }

    .student {
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .icon {
      font-size: 28px;
    }

    .small {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.95;
    }

    .message {
      margin-top: 18px;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="badge">Smart Attendance System</div>
    <h1>Select Your Role</h1>
    <p>Choose the section that matches your account.</p>
    <div class="options">
      <button class="doctor" onclick="showRole('Doctor')">
        <span class="icon">📘</span>
        <span>Doctor</span>
        <span class="small">Manage attendance</span>
      </button>
      <button class="student" onclick="showRole('Student')">
        <span class="icon">🎓</span>
        <span>Student</span>
        <span class="small">View your status</span>
      </button>
    </div>
    <div class="message" id="message">Choose a role to continue.</div>
  </div>

  <script>
    function showRole(role) {
      sessionStorage.setItem('pageHistory', JSON.stringify(['Home']));

      if (role === 'Doctor') {
        window.location.href = 'doctor.html';
      } else if (role === 'Student') {
        window.location.href = 'student.html';
      }
    }
  </script>
</body>
</html>
