<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Action</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      color: #0f172a;
    }

    .card {
      width: min(560px, 100%);
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
      padding: 22px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #1d4ed8;
    }

    p {
      margin: 8px 0;
      color: #475569;
      line-height: 1.5;
    }

    .actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
      cursor: pointer;
    }

    .btn.break {
      background: #1d4ed8;
    }

    .btn.excuse {
      background: #0f766e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Check-in Already Submitted</h1>
    <p id="studentRef">Student: -</p>
    <p id="lectureRef">Lecture ID: -</p>

    <p>Choose one action below.</p>

    <div class="actions">
      <button class="btn break" onclick="goBreak()">Break 5 Minutes</button>
      <button class="btn excuse" onclick="goExcuse()">Excuse</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const lectureId = params.get('lectureId') || '';
    const studentId = params.get('studentId') || '';
    const studentName = params.get('studentName') || '';

    document.getElementById('lectureRef').textContent = lectureId ? `Lecture ID: ${lectureId}` : 'Lecture ID: -';
    if (studentId || studentName) {
      document.getElementById('studentRef').textContent = `Student: ${studentName || '-'} (${studentId || '-'})`;
    }

    function goBreak() {
      window.location.href = `student-break.html?${params.toString()}`;
    }

    function goExcuse() {
      window.location.href = `student-excuse.html?${params.toString()}`;
    }
  </script>
</body>
</html>
