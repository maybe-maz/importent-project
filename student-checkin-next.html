<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break And Excuse</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      color: #0f172a;
    }

    .card {
      width: min(520px, 100%);
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
      padding: 22px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #1d4ed8;
    }

    p {
      margin: 8px 0;
      color: #475569;
      line-height: 1.5;
    }

    .row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
      cursor: pointer;
    }

    .btn.secondary {
      background: #0f766e;
    }

    .btn.muted {
      background: #94a3b8;
    }

    .timer {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
    }

    .box {
      margin-top: 14px;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      background: #f8fbff;
      padding: 12px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 84px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .status-msg {
      margin-top: 10px;
      color: #0f766e;
      font-size: 13px;
      font-weight: 700;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Check-in Already Submitted</h1>
    <p id="studentRef">Student: -</p>
    <p id="lectureRef">Lecture ID: -</p>

    <div class="row">
      <button id="breakBtn" class="btn" onclick="startBreakTimer()">Break 5 Minutes</button>
      <button id="returnBtn" class="btn secondary" onclick="returnFromBreak()" disabled>I'm Back From Break</button>
    </div>
    <div class="timer" id="breakTimer">Break timer: 05:00</div>

    <div class="box">
      <label for="excuseReason">Excuse Reason</label>
      <textarea id="excuseReason" placeholder="Write reason for leaving..."></textarea>
      <button class="btn" onclick="submitExcuse()">Send Excuse</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <button class="btn muted" onclick="window.location.href='indext.html'">Go Home</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const lectureId = params.get('lectureId') || '';
    const studentId = params.get('studentId') || '';
    const studentName = params.get('studentName') || '';
    const API_BASE_STORAGE_KEY = 'attendanceApiBaseUrl';
    const SUPABASE_ANON_KEY_STORAGE_KEY = 'attendanceSupabaseAnonKey';
    let breakIntervalId = null;
    let breakEndAt = null;

    document.getElementById('lectureRef').textContent = lectureId ? `Lecture ID: ${lectureId}` : 'Lecture ID: -';
    if (studentId || studentName) {
      document.getElementById('studentRef').textContent = `Student: ${studentName || '-'} (${studentId || '-'})`;
    }

    function normalizeApiBase(value) {
      const trimmed = (value || '').trim();
      if (!trimmed) return '';
      return trimmed.replace(/\/+$/, '');
    }

    function getApiBase() {
      return normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY) || '');
    }

    function getSupabaseRestBase() {
      const base = getApiBase();
      if (!base) return '';
      if (base.includes('/rest/v1')) return base;
      if (base.includes('.supabase.co')) return `${base}/rest/v1`;
      return '';
    }

    function getSupabaseAnonKey() {
      return (localStorage.getItem(SUPABASE_ANON_KEY_STORAGE_KEY) || '').trim();
    }

    function isSupabaseMode() {
      return !!(getSupabaseRestBase() && getSupabaseAnonKey());
    }

    function isUuid(value) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test((value || '').trim());
    }

    function getSupabaseHeaders() {
      const key = getSupabaseAnonKey();
      return {
        'Content-Type': 'application/json',
        apikey: key,
        Authorization: `Bearer ${key}`
      };
    }

    function setStatusMessage(message, isError = false) {
      const el = document.getElementById('statusMsg');
      el.textContent = message;
      el.style.color = isError ? '#b91c1c' : '#0f766e';
    }

    function formatSeconds(total) {
      const safe = Math.max(0, total);
      const minutes = Math.floor(safe / 60);
      const seconds = safe % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function refreshBreakTimer() {
      if (!breakEndAt) return;
      const remainingMs = breakEndAt - Date.now();
      const remainingSec = Math.ceil(remainingMs / 1000);
      const timerEl = document.getElementById('breakTimer');
      timerEl.textContent = `Break timer: ${formatSeconds(remainingSec)}`;

      if (remainingMs <= 0) {
        clearInterval(breakIntervalId);
        breakIntervalId = null;
        breakEndAt = null;
        document.getElementById('returnBtn').disabled = false;
        timerEl.textContent = 'Break timer: 00:00 (time is up)';
        setStatusMessage('Break finished. Press "I\'m Back From Break".');
      }
    }

    function startBreakTimer() {
      if (breakIntervalId) return;
      breakEndAt = Date.now() + (5 * 60 * 1000);
      document.getElementById('breakBtn').disabled = true;
      document.getElementById('returnBtn').disabled = true;
      setStatusMessage('Break started for 5 minutes.');
      refreshBreakTimer();
      breakIntervalId = setInterval(refreshBreakTimer, 1000);
    }

    function returnFromBreak() {
      if (breakIntervalId) {
        clearInterval(breakIntervalId);
        breakIntervalId = null;
      }
      breakEndAt = null;
      document.getElementById('breakBtn').disabled = false;
      document.getElementById('returnBtn').disabled = true;
      document.getElementById('breakTimer').textContent = 'Break timer: 05:00';
      setStatusMessage('Welcome back from break.');
    }

    async function submitExcuse() {
      const reason = document.getElementById('excuseReason').value.trim();
      if (!reason) {
        setStatusMessage('Please write an excuse reason first.', true);
        return;
      }

      if (!lectureId || !studentId) {
        setStatusMessage('Cannot send excuse: lecture or student info is missing.', true);
        return;
      }

      const note = `Excuse: ${reason}`;

      if (isSupabaseMode()) {
        if (!isUuid(lectureId)) {
          setStatusMessage('Lecture ID is not valid for Supabase.', true);
          return;
        }

        const response = await fetch(`${getSupabaseRestBase()}/attendance?lecture_id=eq.${encodeURIComponent(lectureId)}&student_id=eq.${encodeURIComponent(studentId)}`, {
          method: 'PATCH',
          headers: {
            ...getSupabaseHeaders(),
            Prefer: 'return=representation'
          },
          body: JSON.stringify({ note })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({ message: 'Failed to send excuse.' }));
          setStatusMessage(payload.message || payload.error || 'Failed to send excuse.', true);
          return;
        }

        setStatusMessage('Excuse sent successfully. It will appear next to your name.');
        document.getElementById('excuseReason').value = '';
        return;
      }

      if (!getApiBase() && window.location.hostname.includes('github.io')) {
        setStatusMessage('Backend API is not configured for this page.', true);
        return;
      }

      const response = await fetch(`${getApiBase()}/api/attendance/note`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          lectureId,
          studentId,
          studentName,
          note
        })
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({ message: 'Failed to send excuse.' }));
        setStatusMessage(payload.message || 'Failed to send excuse.', true);
        return;
      }

      setStatusMessage('Excuse sent successfully. It will appear next to your name.');
      document.getElementById('excuseReason').value = '';
    }

    window.addEventListener('beforeunload', () => {
      if (breakIntervalId) {
        clearInterval(breakIntervalId);
      }
    });
  </script>
</body>
</html>
